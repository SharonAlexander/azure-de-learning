name: Deploy ADF Pipelines

on:
  push:
    branches:
      - main
    paths:
      - 'adf/**'  # only trigger when ADF files change

env:
  AZURE_RESOURCE_GROUP: rg-de-learning
  ADF_NAME: adf-de-learning

jobs:
  deploy:
    name: Deploy to Azure Data Factory
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Log in to Azure using service principal
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 3 — Install ADF tools
      - name: Install ADF Utilities
        run: npm install -g @microsoft/azure-data-factory-utilities

      # Step 4 — Validate ADF resources
      - name: Validate ADF
        run: |
          cd adf
          node node_modules/@microsoft/azure-data-factory-utilities/lib/index.js \
            validate \
            . \
            /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ env.ADF_NAME }}

      # Step 5 — Generate ARM template from ADF JSON files
      - name: Export ARM Template
        run: |
          cd adf
          node node_modules/@microsoft/azure-data-factory-utilities/lib/index.js \
            export \
            . \
            /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ env.ADF_NAME }} \
            "ARMTemplateForFactory.json"

      # Step 6 — Deploy ARM template to ADF
      - name: Deploy ADF ARM Template
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./adf/ARMTemplateForFactory.json
          parameters: factoryName=${{ env.ADF_NAME }}